version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fishi
    ports: ["5432:5432"]
    volumes: [db_data:/var/lib/postgresql/data]
  redis:
    image: redis:7
    ports: ["6379:6379"]
  meili:
    image: getmeili/meilisearch:v1.8
    environment:
      MEILI_MASTER_KEY: master_key
    ports: ["7700:7700"]
  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports: ["8025:8025"]
volumes:
  db_data:
